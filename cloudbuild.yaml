substitutions:
  _REGION: us-central1
  _REPO: vgen
  _API_SERVICE: vgen-api
  _WORKER_SERVICE: vgen-worker
  _FRONTEND_SERVICE: vgen-frontend

steps:
  # ---- Build backend image ----
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
      - .

  # ---- Build frontend image ----
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.frontend
      - --build-arg
      - VITE_API_URL=https://${_API_SERVICE}-$PROJECT_NUMBER.${_REGION}.run.app/api
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest
      - .
    waitFor: ["-"] # run in parallel with backend build

  # ---- Push backend image ----
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend
    waitFor: [build-backend]

  # ---- Push frontend image ----
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend
    waitFor: [build-frontend]

  # ---- Deploy API ----
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_API_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --quiet
    waitFor: [push-backend]

  # ---- Deploy Worker ----
  - id: deploy-worker
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_WORKER_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --command=python,-m,src.worker.consumer
      - --quiet
    waitFor: [push-backend] # parallel with deploy-api

  # ---- Deploy Frontend ----
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --quiet
    waitFor: [push-frontend] # parallel with backend deploys

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
